name: JAMALISO CI (Industrial Standard)

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Lint check
      run: npm run lint

    - name: Build Next.js
      run: npm run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}

    - name: Security Check (Secret Exposure)
      run: |
        if grep -rE "sk_|key_|token_" . --exclude-dir={node_modules,.next,.git}; then
          echo "🚨 Posible secreto expuesto detectado en el código!"
          exit 1
        fi
